<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6c5ce7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Лента Припоминания</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #4a4a6a;
            --accent: #6c5ce7;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --radius: 16px;
            --spoiler-bg: #f0f0f5;
            --border: #e0e0ea;
            --transition: all 0.2s ease;
            --text-scale: 1;
        }

        .tag-colors {
            --tag-0: #e8f5e9;
            --tag-1: #fff3e0;
            --tag-2: #e3f2fd;
            --tag-3: #f3e5f5;
            --tag-4: #fce4ec;
            --tag-5: #e0f7fa;
            --tag-6: #f1f8e9;
            --tag-7: #fff8e1;
            --tag-8: #ede7f6;
            --tag-9: #fbe9e7;
        }

        [data-theme="dark"] {
            --bg: #12121a;
            --card-bg: #1e1e2e;
            --text: #e8e8f0;
            --text-secondary: #a0a0b8;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
            --spoiler-bg: #2a2a3e;
            --border: #33334a;
            --tag-0: #1e3a2a;
            --tag-1: #3a2e1e;
            --tag-2: #1e2a3a;
            --tag-3: #2a1e3a;
            --tag-4: #3a1e2a;
            --tag-5: #1e2e3a;
            --tag-6: #2a3a1e;
            --tag-7: #3a3a1e;
            --tag-8: #2a1e3a;
            --tag-9: #3a2a1e;
        }

        html {
            font-size: calc(14px * var(--text-scale));
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: var(--transition);
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .header h1 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, var(--accent), #fd79a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text);
            box-shadow: var(--shadow);
        }

        .icon-btn:active {
            transform: scale(0.94);
        }

        .font-panel {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 10px 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            transition: var(--transition);
        }

        .font-panel label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .font-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .font-controls input[type="range"] {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--accent);
            border-radius: 4px;
            outline: none;
        }

        .font-controls input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: 2px solid var(--card-bg);
            box-shadow: var(--shadow);
        }

        .font-controls .size-label {
            min-width: 30px;
            text-align: center;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text);
        }

        .font-controls .btn-small {
            padding: 2px 10px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        .font-controls .btn-small:active {
            transform: scale(0.92);
        }

        .form-box {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .form-box input,
        .form-box textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 10px;
            font-family: inherit;
            background: var(--bg);
            color: var(--text);
            transition: var(--transition);
        }

        .form-box input:focus,
        .form-box textarea:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
        }

        .form-box textarea {
            resize: vertical;
            min-height: 60px;
        }

        .form-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .form-row input {
            flex: 1;
            margin-bottom: 0;
            min-width: 120px;
        }

        .form-row .btn-sm {
            padding: 0 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }

        .form-row .btn-sm:active {
            transform: scale(0.94);
        }

        .btn {
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            padding: 12px;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            width: 100%;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-shuffle {
            background: #00b894;
            color: #fff;
            padding: 8px 16px;
            width: auto;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .controls .counter {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .controls .filter-group {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-group select {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            font-size: 0.85rem;
            max-width: 140px;
        }

        .filter-group .clear-filter {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .filter-group .clear-filter:hover {
            background: #fee2e2;
            color: #e11d48;
        }

        .feed {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: var(--transition);
            animation: slideUp 0.3s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card .question {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 6px;
            padding-left: 12px;
            border-left: 4px solid var(--accent);
            word-wrap: break-word;
        }

        .card .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
            padding-left: 12px;
        }

        .card .tag {
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: default;
            transition: var(--transition);
        }

        .card .tag .remove-tag {
            cursor: pointer;
            opacity: 0.6;
            font-size: 0.8rem;
            margin-left: 2px;
        }

        .card .tag .remove-tag:hover {
            opacity: 1;
            color: #e11d48;
        }

        .answer-block {
            background: var(--spoiler-bg);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border);
            position: relative;
        }

        .answer-block.revealed {
            background: var(--card-bg);
            border-color: var(--accent);
        }

        .answer-text {
            display: none;
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text);
            word-wrap: break-word;
        }

        .answer-text img {
            max-width: 100%;
            border-radius: 6px;
            display: block;
            margin: 8px 0;
        }

        .answer-text a {
            color: var(--accent);
            text-decoration: underline;
            word-break: break-all;
        }

        .answer-block.revealed .answer-text {
            display: block;
        }

        .answer-block.revealed .placeholder {
            display: none;
        }

        .placeholder {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .edit-actions {
            display: none;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .answer-block.revealed .edit-actions {
            display: flex;
        }

        .edit-actions .btn-sm {
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .edit-actions .btn-edit {
            background: var(--accent);
            color: #fff;
        }

        .edit-actions .btn-cancel {
            background: #e0e0ea;
            color: #333;
        }

        .edit-area {
            display: none;
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-family: inherit;
            font-size: 0.95rem;
            margin-top: 6px;
            background: var(--bg);
            color: var(--text);
            resize: vertical;
            min-height: 60px;
        }

        .edit-area.active {
            display: block;
        }

        .edit-tags-area {
            display: none;
            margin-top: 8px;
        }

        .edit-tags-area input {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-family: inherit;
            font-size: 0.9rem;
            background: var(--bg);
            color: var(--text);
        }

        .edit-tags-area .btn-sm {
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .card-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 10px;
        }

        .card-footer .btn-sm {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: var(--transition);
        }

        .card-footer .btn-sm:hover {
            background: #fee2e2;
            color: #e11d48;
        }

        .empty {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 0;
        }

        .drawing-area {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            display: none;
        }

        .drawing-area.active {
            display: block;
        }

        .drawing-area canvas {
            width: 100%;
            height: auto;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: crosshair;
            touch-action: none;
            background: #ffffff;
        }

        .drawing-controls {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .drawing-controls .btn-sm {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.85rem;
        }

        .drawing-controls .btn-sm:active {
            transform: scale(0.94);
        }

        .drawing-controls input[type="color"] {
            width: 36px;
            height: 36px;
            border: 2px solid var(--border);
            border-radius: 50%;
            padding: 2px;
            cursor: pointer;
            background: none;
        }

        .drawing-controls input[type="range"] {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--accent);
            border-radius: 4px;
            outline: none;
        }

        .drawing-controls input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: 2px solid var(--card-bg);
        }

        .drawing-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text);
            box-shadow: var(--shadow);
            margin-bottom: 10px;
        }

        .drawing-toggle:active {
            transform: scale(0.94);
        }

        .image-upload-area {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .image-upload-area input[type="file"] {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-size: 0.85rem;
        }

        .image-upload-area .btn-sm {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
        }

        [data-theme="dark"] .drawing-area canvas {
            background: #ffffff;
        }

        @media (max-width: 400px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .btn-shuffle {
                width: 100%;
            }
            .font-controls input[type="range"] {
                width: 70px;
            }
            .filter-group select {
                max-width: 100%;
            }
            .drawing-controls input[type="range"] {
                width: 60px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🧠 Лента</h1>
        <div class="header-actions">
            <button class="icon-btn" id="themeToggle" aria-label="Тёмная тема">🌙</button>
        </div>
    </div>

    <div class="font-panel">
        <label>🔤 Размер шрифта</label>
        <div class="font-controls">
            <button class="btn-small" id="fontDec">A−</button>
            <input type="range" id="fontSlider" min="0.7" max="1.6" step="0.05" value="1.0">
            <span class="size-label" id="fontSizeLabel">1.0</span>
            <button class="btn-small" id="fontInc">A+</button>
        </div>
    </div>

    <div class="form-box">
        <input type="text" id="qInput" placeholder="❓ Вопрос..." autocomplete="off">
        <textarea id="aInput" placeholder="📝 Ответ... (можно вставить ссылку или HTML-код)" autocomplete="off"></textarea>
        
        <button class="drawing-toggle" id="drawingToggle">✏️ Открыть рисовалку</button>

        <div class="drawing-area" id="drawingArea">
            <canvas id="drawCanvas" width="600" height="400"></canvas>
            <div class="drawing-controls">
                <input type="color" id="drawColor" value="#6c5ce7">
                <input type="range" id="drawSize" min="2" max="20" value="4">
                <span style="font-size:0.8rem; color: var(--text-secondary);">Толщина</span>
                <button class="btn-sm" id="clearDrawBtn">🗑 Очистить</button>
                <button class="btn-sm" id="insertDrawBtn">📥 Вставить в ответ</button>
                <button class="btn-sm" id="closeDrawBtn">✖ Закрыть</button>
            </div>
        </div>

        <div class="image-upload-area">
            <input type="file" id="imageInput" accept="image/*">
            <button class="btn-sm" id="insertImageBtn">📷 Вставить фото</button>
        </div>

        <div class="form-row">
            <input type="text" id="tagInput" placeholder="🏷️ Теги (через запятую)" autocomplete="off" list="tagSuggestions">
            <datalist id="tagSuggestions"></datalist>
            <button class="btn-sm" id="addTagBtn">➕</button>
        </div>
        <button class="btn btn-primary" id="addBtn">➕ Добавить карточку</button>
    </div>

    <div class="controls">
        <span class="counter" id="counter">📚 0 карточек</span>
        <div class="filter-group">
            <select id="tagFilter">
                <option value="">Все теги</option>
            </select>
            <button class="clear-filter" id="clearFilter">✕</button>
            <button class="btn btn-shuffle" id="shuffleBtn">🔀</button>
        </div>
    </div>

    <div id="feed" class="feed"></div>
</div>

<script>
    const STORAGE_KEY = 'memory_cards_data';
    const THEME_KEY = 'theme';
    const FONT_KEY = 'fontScale';

    let cards = loadCards();
    let filterTag = '';
    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;

    const feed = document.getElementById('feed');
    const counter = document.getElementById('counter');
    const qInput = document.getElementById('qInput');
    const aInput = document.getElementById('aInput');
    const tagInput = document.getElementById('tagInput');
    const addTagBtn = document.getElementById('addTagBtn');
    const addBtn = document.getElementById('addBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const themeToggle = document.getElementById('themeToggle');
    const fontSlider = document.getElementById('fontSlider');
    const fontSizeLabel = document.getElementById('fontSizeLabel');
    const fontInc = document.getElementById('fontInc');
    const fontDec = document.getElementById('fontDec');
    const tagFilter = document.getElementById('tagFilter');
    const clearFilter = document.getElementById('clearFilter');
    const imageInput = document.getElementById('imageInput');
    const insertImageBtn = document.getElementById('insertImageBtn');

    const drawingToggle = document.getElementById('drawingToggle');
    const drawingArea = document.getElementById('drawingArea');
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    const drawColor = document.getElementById('drawColor');
    const drawSize = document.getElementById('drawSize');
    const clearDrawBtn = document.getElementById('clearDrawBtn');
    const insertDrawBtn = document.getElementById('insertDrawBtn');
    const closeDrawBtn = document.getElementById('closeDrawBtn');

    const tagColors = [
        'var(--tag-0)', 'var(--tag-1)', 'var(--tag-2)', 'var(--tag-3)', 'var(--tag-4)',
        'var(--tag-5)', 'var(--tag-6)', 'var(--tag-7)', 'var(--tag-8)', 'var(--tag-9)'
    ];

    function getTagColor(tag) {
        let hash = 0;
        for (let i = 0; i < tag.length; i++) {
            hash = tag.charCodeAt(i) + ((hash << 5) - hash);
        }
        return tagColors[Math.abs(hash) % tagColors.length];
    }

    function loadCards() {
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const parsed = JSON.parse(saved);
                if (Array.isArray(parsed) && parsed.length) {
                    return parsed.map(c => ({ ...c, tags: c.tags || [] }));
                }
            }
        } catch (_) {}
        return [
            { q: "💡 В чем главный плюс Активного Припоминания?", a: "Оно заставляет мозг напрягаться, создавая прочные нейронные связи.", tags: ["🧠 память", "метод"] },
            { q: "📚 Как называется система карточек по ячейкам?", a: "Система Лейтнера (Leitner system).", tags: ["📚 обучение"] },
            { q: "🧠 Какой эффект укрепляет память лучше перечитывания?", a: "Эффект тестирования (Testing Effect).", tags: ["🧠 память"] }
        ];
    }

    function saveCards() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
        } catch (_) {}
        updateFilterOptions();
    }

    function getAllTags() {
        const tagSet = new Set();
        cards.forEach(c => (c.tags || []).forEach(t => tagSet.add(t.trim())));
        return Array.from(tagSet).filter(t => t);
    }

    function updateFilterOptions() {
        const allTags = getAllTags();
        const currentVal = tagFilter.value;
        tagFilter.innerHTML = '<option value="">Все теги</option>';
        allTags.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t;
            opt.textContent = t;
            tagFilter.appendChild(opt);
        });
        if (currentVal && allTags.includes(currentVal)) {
            tagFilter.value = currentVal;
        } else {
            tagFilter.value = '';
            filterTag = '';
        }
        const datalist = document.getElementById('tagSuggestions');
        if (datalist) {
            datalist.innerHTML = '';
            allTags.forEach(t => {
                const option = document.createElement('option');
                option.value = t;
                datalist.appendChild(option);
            });
        }
    }

    function getFilteredCards() {
        if (!filterTag) return cards;
        return cards.filter(c => (c.tags || []).includes(filterTag));
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function showToast(msg) {
        let toast = document.getElementById('toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'toast';
            toast.style.cssText = `
                position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
                background: #1a1a2e; color: #fff; padding: 10px 24px; border-radius: 30px;
                font-size: 14px; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
                opacity: 0; transition: opacity 0.3s; z-index: 999; pointer-events: none;
                max-width: 90%;
                text-align: center;
            `;
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.style.opacity = '1';
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => { toast.style.opacity = '0'; }, 2000);
    }

    function renderFeed() {
        const filtered = getFilteredCards();
        if (!filtered.length) {
            feed.innerHTML = `<div class="empty">📭 Нет карточек${filterTag ? ' с тегом "' + filterTag + '"' : ''}. Добавь свою первую!</div>`;
            counter.textContent = `📚 ${cards.length} карточек${filterTag ? ' (фильтр: ' + filterTag + ')' : ''}`;
            return;
        }

        counter.textContent = `📚 ${cards.length} карточек${filterTag ? ' (фильтр: ' + filterTag + ')' : ''}`;
        feed.innerHTML = '';

        filtered.forEach((card, idx) => {
            const realIndex = cards.indexOf(card);
            const cardDiv = document.createElement('div');
            cardDiv.className = 'card';
            cardDiv.dataset.index = realIndex;

            const tagsHtml = (card.tags || []).map(t => {
                const color = getTagColor(t);
                return `<span class="tag" style="background: ${color};">${escapeHtml(t)}<span class="remove-tag" data-tag="${escapeHtml(t)}" data-index="${realIndex}">✕</span></span>`;
            }).join('');

            cardDiv.innerHTML = `
                <div class="question">${escapeHtml(card.q)}</div>
                ${tagsHtml ? `<div class="tags">${tagsHtml}</div>` : ''}
                <div class="answer-block" data-index="${realIndex}">
                    <span class="placeholder">👆 Нажми, чтобы открыть ответ</span>
                    <span class="answer-text">${card.a}</span>
                    <div class="edit-actions">
                        <button class="btn-sm btn-edit edit-btn" data-index="${realIndex}">✏️ Редактировать</button>
                        <button class="btn-sm btn-edit edit-tags-btn" data-index="${realIndex}">🏷️ Теги</button>
                    </div>
                    <textarea class="edit-area" data-index="${realIndex}"></textarea>
                    <div class="edit-actions" style="display:none;">
                        <button class="btn-sm btn-edit save-edit-btn" data-index="${realIndex}">💾 Сохранить</button>
                        <button class="btn-sm btn-cancel cancel-edit-btn" data-index="${realIndex}">Отмена</button>
                    </div>
                    <div class="edit-tags-area">
                        <input type="text" class="tags-edit-input" placeholder="Теги через запятую" value="${escapeHtml((card.tags || []).join(', '))}" list="tagSuggestionsEdit">
                        <datalist id="tagSuggestionsEdit"></datalist>
                        <div style="display:flex; gap:6px; margin-top:6px;">
                            <button class="btn-sm btn-edit save-tags-btn" data-index="${realIndex}">💾 Сохранить теги</button>
                            <button class="btn-sm btn-cancel cancel-tags-btn" data-index="${realIndex}">Отмена</button>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <button class="btn-sm delete-btn" data-index="${realIndex}">🗑 Удалить</button>
                </div>
            `;

            feed.appendChild(cardDiv);
        });
    }

    function addCard() {
        const q = qInput.value.trim();
        let a = aInput.value.trim();
        const tagsRaw = tagInput.value.trim();
        if (!q || !a) {
            showToast('❌ Заполните вопрос и ответ');
            return;
        }
        const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(t => t) : [];
        cards.unshift({ q, a, tags });
        qInput.value = '';
        aInput.value = '';
        tagInput.value = '';
        imageInput.value = '';
        saveCards();
        renderFeed();
        updateFilterOptions();
        showToast('✅ Добавлено!');
    }

    function deleteCard(index) {
        if (index < 0 || index >= cards.length) return;
        if (!confirm('🗑 Удалить карточку?')) return;
        cards.splice(index, 1);
        saveCards();
        renderFeed();
        updateFilterOptions();
        showToast('🗑 Удалено');
    }

    function shuffleCards() {
        if (cards.length < 2) {
            showToast('🔀 Мало карточек для перемешивания');
            return;
        }
        for (let i = cards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cards[i], cards[j]] = [cards[j], cards[i]];
        }
        saveCards();
        renderFeed();
        showToast('🔀 Перемешано!');
    }

    function removeTagFromCard(cardIndex, tagToRemove) {
        if (cardIndex < 0 || cardIndex >= cards.length) return;
        const card = cards[cardIndex];
        card.tags = (card.tags || []).filter(t => t !== tagToRemove);
        saveCards();
        renderFeed();
        updateFilterOptions();
        showToast(`🗑 Тег "${tagToRemove}" удален`);
    }

    function openEdit(block) {
        const index = parseInt(block.dataset.index);
        const card = cards[index];
        if (!card) return;

        const display = block.querySelector('.answer-text');
        const editArea = block.querySelector('.edit-area');
        const editActions = block.querySelectorAll('.edit-actions');
        const tagsArea = block.querySelector('.edit-tags-area');

        if (tagsArea) tagsArea.style.display = 'none';
        editArea.value = card.a;
        editArea.classList.add('active');
        editArea.style.display = 'block';
        editActions[0].style.display = 'none';
        editActions[1].style.display = 'flex';
        display.style.display = 'none';
        editArea.focus();
    }

    function openEditTags(block) {
        const index = parseInt(block.dataset.index);
        const card = cards[index];
        if (!card) return;

        const display = block.querySelector('.answer-text');
        const editArea = block.querySelector('.edit-area');
        const editActions = block.querySelectorAll('.edit-actions');
        const tagsArea = block.querySelector('.edit-tags-area');
        const input = tagsArea.querySelector('.tags-edit-input');
        const datalist = tagsArea.querySelector('#tagSuggestionsEdit');

        const allTags = getAllTags();
        datalist.innerHTML = '';
        allTags.forEach(t => {
            const option = document.createElement('option');
            option.value = t;
            datalist.appendChild(option);
        });

        if (editArea) { editArea.style.display = 'none'; editArea.classList.remove('active'); }
        editActions[0].style.display = 'none';
        editActions[1].style.display = 'none';
        tagsArea.style.display = 'block';
        input.value = (card.tags || []).join(', ');
        input.focus();
    }

    function saveEdit(block) {
        const index = parseInt(block.dataset.index);
        const card = cards[index];
        if (!card) return;

        const editArea = block.querySelector('.edit-area');
        const display = block.querySelector('.answer-text');
        const editActions = block.querySelectorAll('.edit-actions');

        const newText = editArea.value.trim();
        if (!newText) {
            showToast('❌ Ответ не может быть пустым');
            return;
        }

        card.a = newText;
        display.innerHTML = newText;
        saveCards();

        editArea.classList.remove('active');
        editArea.style.display = 'none';
        editActions[0].style.display = 'flex';
        editActions[1].style.display = 'none';
        display.style.display = 'block';

        block.classList.add('revealed');
        showToast('✅ Ответ обновлён');
    }

    function cancelEdit(block) {
        const display = block.querySelector('.answer-text');
        const editArea = block.querySelector('.edit-area');
        const editActions = block.querySelectorAll('.edit-actions');
        const tagsArea = block.querySelector('.edit-tags-area');

        if (tagsArea) tagsArea.style.display = 'none';
        editArea.classList.remove('active');
        editArea.style.display = 'none';
        editActions[0].style.display = 'flex';
        editActions[1].style.display = 'none';
        display.style.display = 'block';

        block.classList.remove('revealed');
        showToast('❌ Отменено');
    }

    function saveTags(block) {
        const index = parseInt(block.dataset.index);
        const card = cards[index];
        if (!card) return;

        const tagsArea = block.querySelector('.edit-tags-area');
        const input = tagsArea.querySelector('.tags-edit-input');
        const tagsRaw = input.value.trim();
        const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(t => t) : [];
        card.tags = tags;
        saveCards();

        tagsArea.style.display = 'none';
        const editActions = block.querySelectorAll('.edit-actions');
        editActions[0].style.display = 'flex';
        block.classList.add('revealed');
        renderFeed();
        updateFilterOptions();
        showToast('✅ Теги обновлены');
    }

    function cancelTags(block) {
        const tagsArea = block.querySelector('.edit-tags-area');
        tagsArea.style.display = 'none';
        const editActions = block.querySelectorAll('.edit-actions');
        editActions[0].style.display = 'flex';
        showToast('❌ Отменено');
    }

    function insertImage() {
        const file = imageInput.files[0];
        if (!file) {
            showToast('📷 Выберите изображение');
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            const imgData = e.target.result;
            const imgHtml = `<img src="${imgData}" alt="Пользовательское изображение">`;
            const currentText = aInput.value;
            aInput.value = currentText + (currentText ? '\n' : '') + imgHtml;
            showToast('✅ Изображение вставлено в ответ');
            imageInput.value = '';
        };
        reader.readAsDataURL(file);
    }

    function initCanvas() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width || 600;
        canvas.height = rect.height || 400;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
    }

    function getCanvasCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
            e.preventDefault();
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        
        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    function startDrawing(e) {
        e.preventDefault();
        isDrawing = true;
        const coords = getCanvasCoords(e);
        lastX = coords.x;
        lastY = coords.y;
    }

    function draw(e) {
        e.preventDefault();
        if (!isDrawing) return;
        
        const coords = getCanvasCoords(e);
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(coords.x, coords.y);
        ctx.strokeStyle = drawColor.value;
        ctx.lineWidth = drawSize.value;
        ctx.stroke();
        
        lastX = coords.x;
        lastY = coords.y;
    }

    function stopDrawing(e) {
        e.preventDefault();
        isDrawing = false;
    }

    function clearCanvas() {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        showToast('🗑 Холст очищен');
    }

    function insertDrawing() {
        const dataUrl = canvas.toDataURL('image/png');
        const imgHtml = `<img src="${dataUrl}" alt="Рисунок">`;
        const currentText = aInput.value;
        aInput.value = currentText + (currentText ? '\n' : '') + imgHtml;
        showToast('✅ Рисунок вставлен в ответ');
        drawingArea.classList.remove('active');
        drawingToggle.textContent = '✏️ Открыть рисовалку';
    }

    function toggleDrawing() {
        if (drawingArea.classList.contains('active')) {
            drawingArea.classList.remove('active');
            drawingToggle.textContent = '✏️ Открыть рисовалку';
        } else {
            drawingArea.classList.add('active');
            drawingToggle.textContent = '✖ Закрыть рисовалку';
            setTimeout(initCanvas, 100);
        }
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? '' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
        try { localStorage.setItem(THEME_KEY, next); } catch (_) {}
    }

    function loadTheme() {
        try {
            const saved = localStorage.getItem(THEME_KEY);
            if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️';
            }
        } catch (_) {}
    }

    function setFontScale(value) {
        const clamped = Math.min(1.6, Math.max(0.7, value));
        const rounded = Math.round(clamped * 100) / 100;
        document.documentElement.style.setProperty('--text-scale', rounded);
        fontSlider.value = rounded;
        fontSizeLabel.textContent = rounded.toFixed(1);
        try { localStorage.setItem(FONT_KEY, String(rounded)); } catch (_) {}
    }

    function loadFontScale() {
        try {
            const saved = localStorage.getItem(FONT_KEY);
            if (saved) {
                const val = parseFloat(saved);
                if (!isNaN(val) && val >= 0.7 && val <= 1.6) {
                    setFontScale(val);
                    return;
                }
            }
        } catch (_) {}
        setFontScale(1.0);
    }

    document.getElementById('feed').addEventListener('click', (e) => {
        const target = e.target;
        const block = target.closest('.answer-block');

        if (target.classList.contains('remove-tag')) {
            const tag = target.dataset.tag;
            const index = parseInt(target.dataset.index);
            if (tag && !isNaN(index)) {
                removeTagFromCard(index, tag);
            }
            return;
        }

        if (block && !target.closest('.edit-actions') && !target.closest('.edit-area') && !target.closest('.edit-tags-area')) {
            block.classList.toggle('revealed');
            return;
        }

        const delBtn = target.closest('.delete-btn');
        if (delBtn) {
            const index = parseInt(delBtn.dataset.index);
            if (!isNaN(index)) deleteCard(index);
            return;
        }

        const editBtn = target.closest('.edit-btn');
        if (editBtn && !editBtn.classList.contains('edit-tags-btn')) {
            const block = editBtn.closest('.answer-block');
            if (block) openEdit(block);
            return;
        }

        const editTagsBtn = target.closest('.edit-tags-btn');
        if (editTagsBtn) {
            const block = editTagsBtn.closest('.answer-block');
            if (block) openEditTags(block);
            return;
        }

        const saveBtn = target.closest('.save-edit-btn');
        if (saveBtn) {
            const block = saveBtn.closest('.answer-block');
            if (block) saveEdit(block);
            return;
        }

        const cancelBtn = target.closest('.cancel-edit-btn');
        if (cancelBtn) {
            const block = cancelBtn.closest('.answer-block');
            if (block) cancelEdit(block);
            return;
        }

        const saveTagsBtn = target.closest('.save-tags-btn');
        if (saveTagsBtn) {
            const block = saveTagsBtn.closest('.answer-block');
            if (block) saveTags(block);
            return;
        }

        const cancelTagsBtn = target.closest('.cancel-tags-btn');
        if (cancelTagsBtn) {
            const block = cancelTagsBtn.closest('.answer-block');
            if (block) cancelTags(block);
            return;
        }
    });

    addBtn.addEventListener('click', addCard);
    shuffleBtn.addEventListener('click', shuffleCards);
    themeToggle.addEventListener('click', toggleTheme);
    insertImageBtn.addEventListener('click', insertImage);

    drawingToggle.addEventListener('click', toggleDrawing);
    clearDrawBtn.addEventListener('click', clearCanvas);
    insertDrawBtn.addEventListener('click', insertDrawing);
    closeDrawBtn.addEventListener('click', () => {
        drawingArea.classList.remove('active');
        drawingToggle.textContent = '✏️ Открыть рисовалку';
    });

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseleave', stopDrawing);

    canvas.addEventListener('touchstart', startDrawing, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', stopDrawing, { passive: false });

    window.addEventListener('resize', () => {
        if (drawingArea.classList.contains('active')) {
            initCanvas();
        }
    });

    qInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') addCard();
    });
    aInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            addCard();
        }
    });
    tagInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            addCard();
        }
    });
    addTagBtn.addEventListener('click', addCard);

    fontSlider.addEventListener('input', (e) => {
        setFontScale(parseFloat(e.target.value));
    });
    fontInc.addEventListener('click', () => {
        const current = parseFloat(fontSlider.value) || 1.0;
        setFontScale(current + 0.1);
    });
    fontDec.addEventListener('click', () => {
        const current = parseFloat(fontSlider.value) || 1.0;
        setFontScale(current - 0.1);
    });

    tagFilter.addEventListener('change', (e) => {
        filterTag = e.target.value;
        renderFeed();
    });

    clearFilter.addEventListener('click', () => {
        filterTag = '';
        tagFilter.value = '';
        renderFeed();
    });

    loadTheme();
    loadFontScale();
    updateFilterOptions();
    renderFeed();
    console.log('🧠 Лента Припоминания загружена!');

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(registration => {
                    console.log('SW зарегистрирован:', registration);
                })
                .catch(error => {
                    console.log('Ошибка регистрации SW:', error);
                });
        });
    }
</script>

</body>
</html>
